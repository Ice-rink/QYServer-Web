<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYServer | AI 对话</title>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/AllComponents.js"></script>
    <style>
        /* 固定背景层 */
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }

        /* 隐藏滚动条 */
        html,
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f9f9f9;
        }

        .messages::-webkit-scrollbar-thumb {
            background: hsla(339, 86%, 81%, 0.548);
            border-radius: 3px;
        }

        .messages {
            scrollbar-width: thin;
            scrollbar-color: hsla(339, 86%, 81%, 0.548) #f9f9f9;
        }

        a {
            text-decoration: none;
            color: inherit;
        }


        /* ===== AI 对话区域 ===== */
        #content {
            padding: 60px 0;
            position: relative;
            z-index: 1;
        }

        .content-box {
            max-width: 920px;
            margin: 40px auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .content-box h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
            text-align: center;
        }

        .content-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        /* 新增警示条样式 */
        .ai-warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .ai-warning i {
            font-size: 1.2rem;
        }

        /* 🟢 聊天窗口：使用 flex 布局，内部消息区可滚动，输入区固定底部 */
        .chat-window {
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.98);
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
            height: 70vh;
            /* 🟢 固定整体高度 */
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }

        /* 🟢 消息区：自动占满剩余空间，超出滚动 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            margin: 0;
            padding: 10px 14px;
            border-radius: 10px;
            display: inline-block;
            max-width: 75%;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg.user {
            background: #f8a5c2;
            color: #fff;
            align-self: flex-end;
        }

        .msg.bot {
            background: #f1f1f1;
            color: #333;
            align-self: flex-start;
        }

        /* 🟢 输入区：固定在底部，不参与滚动 */
        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-shrink: 0;
            /* 🟢 不会被压缩 */
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .input-area button {
            padding: 10px 14px;
            border-radius: 8px;
            background: #f8a5c2;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        /* ===== 页脚样式（与 index.html 保持一致） ===== */
        #footer {
            background: #333;
            color: #ddd;
            padding: 50px 0 20px;
            position: relative;
            margin-top: 60px;
        }

        #footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('') center/cover fixed;
            opacity: 0.1;
            z-index: 0;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .footer-section {
            flex: 1;
            min-width: 300px;
            margin-bottom: 30px;
        }

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            padding-bottom: 10px;
        }

        .footer-section h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: #f8a5c2;
        }

        .footer-links a {
            display: block;
            padding: 8px 0;
            transition: all 0.3s;
        }

        .footer-links a:hover {
            color: #f8a5c2;
            padding-left: 5px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #444;
            margin-top: 20px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .footer-bottom a {
            color: #f8a5c2;
            transition: all 0.3s;
        }

        .footer-bottom a:hover {
            text-decoration: underline;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .menu {
                justify-content: center;
            }

            .footer-section {
                min-width: 100%;
            }

            .chat-window {
                height: 75vh;
                /* 🟢 移动端稍微高一点 */
            }
        }
    </style>
</head>

<body>
    <!-- 固定背景层 -->
    <div class="bg-fixed" style="background-image: url('https://t.alcy.cc/pc');"></div>

    <!-- AI 对话区域 -->
    <section id="content">
        <div class="content-box">
            <h2>AI 助手</h2>
            <!-- 新增警示条：内容仅供参考 -->
            <div class="ai-warning">
                <i class="fas fa-exclamation-triangle"></i> 提示：AI回答由模型生成，内容仅供参考，请自行判断准确性。
            </div>
            <div class="chat-window">
                <!-- 🟢 消息区 -->
                <div class="messages" id="messages"></div>
                <!-- 🟢 输入区固定在底部 -->
                <div class="input-area">
                    <input id="prompt" type="text" placeholder="输入你的问题，按回车或点击发送" />
                    <button id="sendBtn">发送</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 原有 AI 功能脚本 -->
    <script src="/lib/marked.min.js"></script>
    <script src="ai.js"></script>

    <!-- 导航栏滚动效果（参考 index.html） -->
    <script>
        (function () {
            const menuBox = document.getElementById('menu-box');

            function updateMenuBar() {
                // 滚动超过 60px 时改变导航栏背景
                if (window.scrollY > 60) {
                    menuBox.style.background = '#FFFFFF';
                    menuBox.style.boxShadow = '0px 0px 15px rgba(0,0,0,0.1)';
                } else {
                    menuBox.style.background = 'none';
                    menuBox.style.boxShadow = 'none';
                }
            }

            window.addEventListener('scroll', updateMenuBar);
            updateMenuBar(); // 初始化调用
        })();
    </script>
</body>

</html>
