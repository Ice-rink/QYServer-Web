<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题详情 - QYServer</title>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/AllComponents.js"></script>
    <script src="/lib/marked.min.js"></script>
    <style>
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: url('https://t.alcy.cc/ycy') center/cover no-repeat;
            pointer-events: none;
        }

        /* 横幅区域 */
        #banner {
            background: linear-gradient(135deg, #f8a5c2 0%, #a56de2 100%);
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 40vh;
            min-height: 300px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            padding: 0 10%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        .banner-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            background: url('') center/cover;
            opacity: 0.15;
            z-index: -1;
        }

        .join-item {
            margin-bottom: 30px;
            color: white;
        }

        .join-item h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* 内容区域 - 添加壁纸 */
        #content {
            padding: 60px 0;
            position: relative;
            min-height: 60vh;
        }

        #content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            z-index: 0;
        }

        .content-box {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .problem-header {
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }

        .problem-header h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 15px;
            position: relative;
            padding-bottom: 15px;
        }

        .problem-header h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        .problem-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .problem-tags mark {
            background: rgba(248, 165, 194, 0.2);
            color: #f8a5c2;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 返回按钮样式修改 - 靠左对齐 */
        .back-button-container {
            text-align: left;
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-block;
            padding: 0.8em 1.5em;
            border: none;
            border-radius: 4px;
            background: #f8a5c2;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(248, 165, 194, 0.3);
        }

        .back-button:hover {
            background: #f78fb3;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(248, 165, 194, 0.4);
        }

        /* 问题内容样式 */
        #problem-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2.5em;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07);
            margin: 2em auto;
            max-width: 800px;
        }

        /* Markdown内容样式 */
        #problem-content h1,
        #problem-content h2,
        #problem-content h3 {
            color: #333;
            margin: 1.5em 0 0.8em;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.3em;
        }

        #problem-content h1 {
            font-size: 1.8rem;
        }

        #problem-content h2 {
            font-size: 1.6rem;
        }

        #problem-content h3 {
            font-size: 1.4rem;
        }

        #problem-content p {
            line-height: 1.7;
            margin-bottom: 1.2em;
            color: #555;
        }

        #problem-content ul,
        #problem-content ol {
            margin-bottom: 1.2em;
            padding-left: 1.5em;
        }

        #problem-content li {
            margin-bottom: 0.5em;
            line-height: 1.6;
        }

        #problem-content blockquote {
            border-left: 4px solid #f8a5c2;
            padding-left: 1em;
            margin: 1.5em 0;
            color: #666;
            background: rgba(248, 165, 194, 0.05);
            padding: 1em;
            border-radius: 0 8px 8px 0;
        }

        #problem-content code {
            background-color: rgba(248, 165, 194, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            color: #f8a5c2;
            font-family: 'Consolas', monospace;
        }

        #problem-content pre {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 1.2em;
            overflow: auto;
            color: #f8f8f2;
            font-family: 'Consolas', monospace;
            line-height: 1.5;
            margin: 1.5em 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #f8a5c2;
        }

        #problem-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        #problem-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
        }

        #problem-content table th,
        #problem-content table td {
            border: 1px solid #ddd;
            padding: 0.8em;
        }

        #problem-content table th {
            background: rgba(248, 165, 194, 0.1);
        }

        #problem-content a {
            color: #2d8cf0;
            transition: all 0.3s;
        }

        #problem-content a:hover {
            color: #f8a5c2;
            text-decoration: underline;
        }

        /* 页脚 */
        #footer {
            background: #333;
            color: #ddd;
            padding: 50px 0 20px;
            position: relative;
        }

        #footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('') center/cover fixed;
            opacity: 0.1;
            z-index: 0;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .footer-section {
            flex: 1;
            min-width: 300px;
            margin-bottom: 30px;
        }

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            padding-bottom: 10px;
        }

        .footer-section h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: #f8a5c2;
        }

        .footer-links a {
            display: block;
            padding: 8px 0;
            transition: all 0.3s;
        }

        .footer-links a:hover {
            color: #f8a5c2;
            padding-left: 5px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #444;
            margin-top: 20px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .footer-bottom a {
            color: #f8a5c2;
            transition: all 0.3s;
        }

        .footer-bottom a:hover {
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 900px) {
            .join-item h2 {
                font-size: 2rem;
            }

            #banner {
                height: 35vh;
                min-height: 250px;
            }
        }

        /* 图片放大模态样式 */
        .img-modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            padding: 20px;
            animation: modalFadeIn 0.18s ease;
        }

        .img-modal-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .img-modal-content img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .img-modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <!-- 固定背景层 -->
    <div class="bg-fixed"></div>

    <!-- 内容区域 -->
    <section id="content">
        <div class="content-box">
            <!-- 返回按钮容器 - 靠左对齐 -->
            <div class="back-button-container">
                <button onclick="window.history.back()" class="back-button">← 返回</button>
            </div>

            <div class="problem-header">
                <h2 id="problem-title">加载中...</h2>
                <div class="problem-tags" id="problem-tags"></div>
            </div>

            <div id="problem-content">加载中...</div>
        </div>
    </section>

    <!-- 评论区: Twikoo 容器（已注释）
        <div class="image-comments" id="imageComments" style="margin-top:20px;">
            <h2 style="color:white;margin-bottom:10px;">评论</h2>
            <div id="tcomment" class="comments-section"></div>
        </div>
        -->

    <script src="faqList.js"></script>
    <script src="/lib/all.js"></script>
    <script>
        

        // 获取 URL 参数
        function getQuery(name) {
            const m = location.search.match(new RegExp('(?:[?&]' + name + '=)([^&]+)'));
            return m ? decodeURIComponent(m[1]) : '';
        }

        // 加载问题内容
        // 加载问题内容
            const id = getQuery('id');
            const problem = problems.find(p => p.id === id);
            const contentElement = document.getElementById('problem-content');
            const titleElement = document.getElementById('problem-title');
            const tagsElement = document.getElementById('problem-tags');

            if (!problem) {
                contentElement.innerHTML = '<p>未找到该问题。</p>';
                titleElement.textContent = '问题不存在';
            } else {
                // 设置标题和标签
                titleElement.textContent = problem.title;
                document.title = problem.title + ' - 问题详情';

                if (problem.tags && problem.tags.length > 0) {
                    tagsElement.innerHTML = problem.tags.map(t => `<mark>${t}</mark>`).join(' ');
                }

                // 显示加载状态
                contentElement.setAttribute('data-loading', 'true');

                fetch(problem.file)
                    .then(r => {
                        if (!r.ok) throw { status: r.status, problem: problem };
                        return r.text();
                    })
                    .then(md => {
                        contentElement.innerHTML = marked.parse(md);
                        // 为渲染后的图片绑定放大行为
                        setTimeout(function () {
                            document.querySelectorAll('#problem-content img').forEach(img => {
                                if (!img) return;
                                img.style.cursor = 'pointer';
                                img.addEventListener('click', function () {
                                    handleImageClick(this.src);
                                });
                            });
                        }, 50);
                    })
                    .catch(error => {
                        console.error('加载问题失败:', error);

                        // 尝试加载模板文件
                        if (error && error.problem) {
                            fetch('md/default.md')
                                .then(r => r.text())
                                .then(template => {
                                    // 替换模板占位符
                                    let content = template
                                        .replace(/\{title\}/g, error.problem.title)
                                        .replace(/\{summary\}/g, error.problem.summary)
                                        .replace(/\{file\}/g, error.problem.file);

                                    // 添加 HTTP 状态码错误信息
                                    content += `\n\n> **HTTP 状态码**: ${error.status || '未知'}`;

                                    contentElement.innerHTML = marked.parse(content);
                                })
                                .catch(() => {
                                    // 模板也加载失败，显示简单错误
                                    contentElement.innerHTML = `
                                        <h1>${error.problem.title}</h1>
                                        <p>${error.problem.summary}</p>
                                        <hr>
                                        <blockquote>
                                            <p><strong>⚠️ 错误信息</strong></p>
                                            <p>请求的文件 <code>${error.problem.file}</code> 未找到。</p>
                                            <p>HTTP 状态码: ${error.status || '未知'}</p>
                                            <p>可能的原因：文件尚未创建、路径配置错误或已被删除。</p>
                                            <p>模板文件也加载失败，请检查 <code>/faq/problems/_template.md</code> 是否存在。</p>
                                        </blockquote>
                                    `;
                                });
                        } else {
                            contentElement.innerHTML = '<p>加载内容时出错：' + (error.message || '未知错误') + '</p>';
                        }
                    })
                    .finally(() => {
                        contentElement.removeAttribute('data-loading');
                    });
            }

        // 图片放大（大屏模态 / 小屏新标签）
        function openImageModal(src) {
            if (!src) return;
            if (window.innerWidth < 900) {
                window.open(src, '_blank');
                return;
            }
            const overlay = document.createElement('div');
            overlay.className = 'img-modal-overlay';
            overlay.innerHTML = `<div class="img-modal-content"><button class="img-modal-close" aria-label="关闭">×</button><img src="${src}" alt=""></div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay || e.target.classList.contains('img-modal-close')) {
                    overlay.remove();
                }
            });
            function onKey(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } }
            document.addEventListener('keydown', onKey);
        }

        function handleImageClick(src) {
            openImageModal(src);
        }
    </script>
    <script>
        // 获取URL参数
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 检测 Twikoo 评论提交：在用户点击提交/发布时记录标记和临时评论内容（用于页面重新加载后本地回显）
        (function () {
            function markPosted(data) {
                try { sessionStorage.setItem('twikoo.justPosted', String(Date.now())); } catch (e) { }
                try {
                    // 仅在有文本内容且包含页面 id 时保存本地回显
                    if (data && data.content && data.id) sessionStorage.setItem('twikoo.lastLocalComment', JSON.stringify(data || {}));
                } catch (e) { }
            }

            function collectCommentData() {
                try {
                    var container = document.getElementById('tcomment');
                    if (!container) return null;

                    // editor: textarea / contenteditable / known classes
                    var editor = container.querySelector('textarea, .tk-textarea, .tk-editor, [contenteditable="true"]');
                    var content = '';
                    if (editor) {
                        var tag = (editor.tagName || '').toLowerCase();
                        if (tag === 'textarea' || tag === 'input') content = editor.value || '';
                        else content = editor.innerText || editor.textContent || '';
                    } else {
                        var ta = container.querySelector('textarea');
                        if (ta) content = ta.value || '';
                    }
                    content = String(content || '').trim();

                    // 收集 meta 输入（昵称/邮箱/网站）的常见候选
                    var name = '', email = '', website = '';
                    var inputs = container.querySelectorAll('input');
                    for (var i = 0; i < inputs.length; i++) {
                        var ip = inputs[i];
                        if (!ip) continue;
                        var v = ip.value || '';
                        if (!v) continue;
                        var key = ((ip.name || ip.placeholder || ip.className) + '').toLowerCase();
                        if (!name && /name|nick|昵称/.test(key)) { name = v; continue; }
                        if (!email && (ip.type === 'email' || /email|mail/.test(key))) { email = v; continue; }
                        if (!website && (ip.type === 'url' || /site|url|website|网站/.test(key))) { website = v; continue; }
                        if (!name) name = v;
                    }

                    // 兜底查找 placeholder 含“昵称”的输入
                    if (!name) {
                        var nameInp = container.querySelector('input[placeholder*="昵称"], input[name*="name"], input[class*="nick"]');
                        if (nameInp) name = nameInp.value || '';
                    }

                    var pageId = (new URLSearchParams(window.location.search)).get('id') || '';
                    return { content: content, name: name, email: email, website: website, time: Date.now(), id: pageId };
                } catch (e) { return null; }
            }

            // 通过委托监听点击，捕获 Twikoo 的提交按钮点击（文本/类名匹配），并收集评论内容
            document.addEventListener('click', function (e) {
                var t = e.target;
                while (t && t !== document) {
                    try {
                        if (t.closest && t.closest('#tcomment')) {
                            var text = (t.innerText || '').toLowerCase();
                            var cls = (t.className || '').toLowerCase();
                            if (/发布|提交|回复|发表评论|发送|发布评论|send|submit|post|publish/.test(text) || /btn|submit|send|publish|post|twikoo/.test(cls)) {
                                var data = collectCommentData();
                                markPosted(data);
                                break;
                            }
                        }
                    } catch (err) { }
                    t = t.parentElement;
                }
            }, true);

            // 也监听表单提交事件作为兜底
            document.addEventListener('submit', function (e) {
                try {
                    var f = e.target;
                    if (f && f.closest && f.closest('#tcomment')) {
                        var data = collectCommentData();
                        markPosted(data);
                    }
                } catch (err) { }
            }, true);
        })();

        // ========== Twikoo 评论系统初始化（使用短哈希区分图片，避免点击刷新导致页面跳动） ==========
        document.addEventListener('DOMContentLoaded', function () {
            // 取得页面 id 参数（未编码）
            var pageId = (new URLSearchParams(window.location.search)).get('id') || '';

            // 计算短哈希（优先使用 SubtleCrypto）
            function shortHash(input) {
                if (!input) return Promise.resolve('noimg');
                if (window.crypto && window.crypto.subtle && window.TextEncoder) {
                    try {
                        var enc = new TextEncoder();
                        return window.crypto.subtle.digest('SHA-256', enc.encode(input)).then(function (buf) {
                            var hex = Array.from(new Uint8Array(buf)).map(function (b) { return ('00' + b.toString(16)).slice(-2); }).join('');
                            return hex.slice(0, 12); // 取前12个十六进制字符，足够区分
                        });
                    } catch (e) { /* fallback below */ }
                }
                // 简单回退 hash（非加密，仅作区分）
                var h = 0;
                for (var i = 0; i < input.length; i++) { h = ((h << 5) - h) + input.charCodeAt(i); h |= 0; }
                return Promise.resolve('h' + (Math.abs(h)).toString(36));
            }

            function escapeHtml(str) {
                if (!str) return '';
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            // 在容器里插入本地回显的临时评论（不会触发滚动或点击）
            function insertTempComment(data) {
                try {
                    var container = document.getElementById('tcomment');
                    if (!container) return;
                    // 防止重复插入
                    if (container.querySelector('.twikoo-local-temp')) return;

                    var wrapper = document.createElement('div');
                    wrapper.className = 'twikoo-local-temp';
                    wrapper.style.padding = '12px';
                    wrapper.style.margin = '12px 0';
                    wrapper.style.border = '1px dashed rgba(255,255,255,0.12)';
                    wrapper.style.background = 'rgba(0,0,0,0.2)';
                    wrapper.style.color = '#fff';
                    wrapper.style.borderRadius = '8px';

                    var nick = data.name || '你';
                    var time = new Date((data.time || Date.now()));
                    var html = '<div style="font-weight:700;margin-bottom:6px;">' + escapeHtml(nick) + ' <span style="font-weight:400;font-size:12px;color:#ddd;margin-left:8px;">(本地回显 · ' + time.toLocaleString() + ')</span></div>';
                    html += '<div style="white-space:pre-wrap;line-height:1.6;color:#fff;">' + escapeHtml(data.content) + '</div>';
                    wrapper.innerHTML = html;
                    // 插入到评论容器顶部，避免滚动到底
                    container.insertAdjacentElement('afterbegin', wrapper);
                } catch (e) { console.error('insertTempComment error', e); }
            }

            // 判断真实评论是否已经出现在 Twikoo 容器（通过内容片段匹配）
            function isRealCommentPresent(container, data) {
                try {
                    if (!container || !data || !data.content) return false;
                    var txt = (container.innerText || '').replace(/\s+/g, ' ').trim();
                    var fragment = data.content.replace(/\s+/g, ' ').trim();
                    if (!fragment) return false;
                    // 比较前 30 个字符是否出现在容器文本中
                    var probe = fragment.slice(0, 30);
                    return txt.indexOf(probe) !== -1;
                } catch (e) { return false; }
            }

            // 计算短哈希后初始化 Twikoo
            shortHash(pageId || window.location.href).then(function (hash) {
                // 使用固定前缀 + 短哈希作为 Twikoo path，避免后端对查询字符串做不一致的规范化
                var path = '/faq/id/' + hash;

                function doInit() {
                    try {
                        if (typeof twikoo === 'undefined') {
                            console.error('Twikoo 库未加载，尝试动态加载');
                            var s = document.createElement('script');
                            s.src = 'https://s4.zstatic.net/npm/twikoo@1.7.3/dist/twikoo.min.js';
                            s.onload = function () { doInit(); };
                            s.onerror = function () { console.error('无法加载 Twikoo 脚本'); };
                            document.head.appendChild(s);
                            return;
                        }

                        twikoo.init({
                            envId: 'https://plapi.qyserver.cc/',
                            el: '#tcomment',
                            lang: 'zh-CN',
                            path: path,
                            placeholder: '来分享你对这张图片的看法吧！支持Markdown语法~',
                            meta: [
                                { name: '昵称', placeholder: '怎么称呼你？（必填）', required: true },
                                { name: '邮箱', placeholder: '方便联系你（选填）', required: false },
                                { name: '网站', placeholder: '你的个人主页（选填）', required: false }
                            ]
                        }).then(function () {
                            console.log('Twikoo 初始化成功，path=' + path);

                            // 若之前有本地回显数据且属于当前图片，则插入本地回显（不点击任何刷新按钮，避免页面蹿动）
                            try {
                                var last = sessionStorage.getItem('twikoo.lastLocalComment');
                                if (last) {
                                    var obj = JSON.parse(last);
                                    if (obj && obj.id === pageId) {
                                        insertTempComment(obj);

                                        // 监视真实评论何时出现，若出现则移除本地回显
                                        var container = document.getElementById('tcomment');
                                        if (container) {
                                            var mo = new MutationObserver(function () {
                                                try {
                                                    if (isRealCommentPresent(container, obj)) {
                                                        var tmp = container.querySelector('.twikoo-local-temp');
                                                        if (tmp && tmp.parentNode) tmp.parentNode.removeChild(tmp);
                                                        try { sessionStorage.removeItem('twikoo.lastLocalComment'); sessionStorage.removeItem('twikoo.justPosted'); } catch (e) { }
                                                        mo.disconnect();
                                                    }
                                                } catch (err) { }
                                            });
                                            mo.observe(container, { childList: true, subtree: true });
                                        }

                                        // 若检测到刚刚提交过评论，尝试安全地触发 Twikoo 的“刷新”控件，但会保存并恢复滚动位置以避免页面蹿动
                                        try {
                                            var justPosted = sessionStorage.getItem('twikoo.justPosted');
                                            if (justPosted && (Date.now() - parseInt(justPosted, 10) < 2 * 60 * 1000)) {
                                                var attempts = 0;
                                                var maxAttempts = 10;
                                                var tryRefresh = function () {
                                                    attempts++;
                                                    var container = document.getElementById('tcomment');
                                                    if (!container) return attempts > maxAttempts;
                                                    var nodes = container.querySelectorAll('button, a, span, div');
                                                    var target = null;
                                                    for (var i = 0; i < nodes.length; i++) {
                                                        var n = nodes[i];
                                                        var txt = (n.innerText || '').trim();
                                                        if (/刷新|重新加载|加载更多|刷新评论|reload|refresh/i.test(txt)) { target = n; break; }
                                                        var cls = n.className || '';
                                                        if (typeof cls === 'string' && /refresh|reload|update|twikoo-refresh|tk-refresh/i.test(cls)) { target = n; break; }
                                                    }
                                                    if (target) {
                                                        try {
                                                            var sx = window.scrollX || window.pageXOffset || 0;
                                                            var sy = window.scrollY || window.pageYOffset || 0;
                                                            var prevScrollBehavior = document.documentElement.style.scrollBehavior || '';
                                                            document.documentElement.style.scrollBehavior = 'auto';
                                                            target.click();
                                                            // 恢复滚动位置，延时以等待 Twikoo 可能的 DOM 操作
                                                            setTimeout(function () {
                                                                try { window.scrollTo(sx, sy); } catch (e) { }
                                                                document.documentElement.style.scrollBehavior = prevScrollBehavior;
                                                            }, 120);
                                                        } catch (e) { }
                                                        try { sessionStorage.removeItem('twikoo.justPosted'); sessionStorage.removeItem('twikoo.lastLocalComment'); } catch (e) { }
                                                        return true;
                                                    }
                                                    return attempts > maxAttempts;
                                                };

                                                var refreshTimer = setInterval(function () {
                                                    var stop = tryRefresh();
                                                    if (stop) clearInterval(refreshTimer);
                                                }, 600);
                                            }
                                        } catch (e) { }
                                    }
                                }
                            } catch (e) { }

                        }).catch(function (err) {
                            console.error('Twikoo 初始化失败:', err);
                            var commentEl = document.getElementById('tcomment');
                            if (commentEl) commentEl.innerHTML = '<p style="color: #f8a5c2; text-align: center;">评论加载失败，请刷新页面或检查 Twikoo 后端服务。</p>';
                        });
                    } catch (e) { console.error('Twikoo init error', e); }
                }

                doInit();
            }).catch(function (err) {
                console.error('计算短哈希失败', err);
            });
        });
        // ========== Twikoo 初始化结束 ==========
    </script>

</body>

</html>
