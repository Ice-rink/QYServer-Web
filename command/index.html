<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYServer | 指令</title>
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/AllComponents.js"></script>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <style>
        /* 内容区域 */
        #content {
            background: white;
            padding: 80px 0;
            position: relative;
        }

        .content-box {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-box h2 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }

        .content-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        hr.divider {
            margin: 40px 0;
            height: 2px;
            background: #EBEBEB;
            border: none;
        }

        .content-section {
            margin-bottom: 60px;
        }

        .content-text h3 {
            font-size: 1.8rem;
            color: #333;
            margin: 25px 0 15px;
            line-height: 1.4;
        }

        .content-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .content-text a {
            color: #337AB7;
            transition: all 0.3s;
            font-weight: bold;
        }

        .content-text a:hover {
            color: #f8a5c2;
            text-decoration: underline;
        }

        .content-image {
            float: right;
            margin: 20px 0 20px 40px;
            width: 45%;
            max-width: 500px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 8px 8px 20px rgba(234, 234, 234, 0.8);
        }

        .content-image img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .content-image img:hover {
            transform: scale(1.05);
        }

        .add-server-btn {
            display: inline-block;
            background: #f8a5c2;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 5px 15px rgba(248, 165, 194, 0.4);
        }

        .add-server-btn:hover {
            background: #f78fb3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(248, 165, 194, 0.6);
        }

        /* 弹窗 */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background-color: #fff;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
            animation: popupFadeIn 0.4s;
        }

        @keyframes popupFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .popup-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid #f8a5c2;
        }

        .popup-message {
            margin-bottom: 25px;
            line-height: 1.7;
            color: #555;
            font-size: 16px;
        }

        .popup-message p {
            margin-bottom: 15px;
        }

        .popup-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popup-checkbox {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .popup-btn {
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .popup-confirm {
            background-color: #f8a5c2;
            color: white;
        }

        .popup-confirm:hover {
            background-color: #f78fb3;
        }

        

        .command-container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .command-category {
            margin-bottom: 40px;
        }

        .command-category h3 {
            color: #a56de2;
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .command-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .command-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .command-icon {
            width: 40px;
            height: 40px;
            background: #f8a5c2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 1.2rem;
        }

        .command-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .command-desc {
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .command-usage {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>

<body>
    <section id="command-section" style="background-color: #f9f9f9;">
        <div class="content-box">
            <hr class="divider">

        </div>
        <!-- 内容区域 - 指令页面 -->
        <section id="command-section" style="background-color: #f9f9f9;">
            <div class="content-box">
                <h2>服务器指令</h2>
                <hr class="divider">

                <div class="command-container">
                </div>
            </div>
        </section>

        <script>
            // 加载指令配置并渲染
                async function loadCommands() {
                    try {
                        const response = await fetch('/Configs/commands.json');
                        const data = await response.json();
                        const container = document.querySelector('.command-container');

                        if (!container) return;

                        container.innerHTML = data.categories.map(category => `
                            <div class="command-category">
                                <h3>${escapeHtml(category.name)}</h3>
                                ${category.commands.map(cmd => `
                                    <div class="command-item">
                                        <div class="command-header">
                                        <div class="command-icon">
                                            <i class="fas ${cmd.icon || 'fa-terminal'}"></i>
                                        </div>
                                        <div class="command-name">${escapeHtml(cmd.name)}</div>
                                    </div>
                                    <div class="command-desc">${escapeHtml(cmd.description)}</div>
                                    ${cmd.usage ? `<div class="command-usage">${escapeHtml(cmd.usage).replace(/\n/g, '<br>')}</div>` : ''}
                                </div>
                                `).join('')}
                            </div>
                        `).join('');
                    } catch (error) {
                        console.error('加载指令列表失败:', error);
                    }
                }

                function escapeHtml(str) {
                    if (!str) return '';
                    return str.replace(/[&<>]/g, function (m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }

                document.addEventListener('DOMContentLoaded', loadCommands);
        </script>

        <script src="/lib/all.js"></script>
</body>

</html>
