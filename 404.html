<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYServer | 404 - 页面未找到</title>
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/AllComponents.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
    #content {
        background: url('https://t.alcy.cc/ycy') no-repeat center center fixed;
        background-size: cover;
        padding: 80px 0;
        position: relative;
        }

        .content-box {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-box h2 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }

        .content-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        hr.divider {
            margin: 40px 0;
            height: 50px;
            background: #ffffff00;
            border: none;
        }

        .content-section {
            margin-bottom: auto;
            background-color: #ffffffa4;
        }

        .content-text h3 {
            font-size: 1.8rem;
            color: #333;
            margin: 25px 0 15px;
            line-height: 1.4;
            text-align: center;
        }

        .content-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: center;
        }

        .content-text a {
            color: #337AB7;
            transition: all 0.3s;
            font-weight: bold;
            text-align: center;
            display: inline-block;
        }

        .content-text a:hover {
            color: #f8a5c2;
            text-decoration: underline;
        }
        .quick-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: white;
            border-radius: 30px;
            color: #555;
            font-size: 1.19rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;

        }
    </style>
</head>

<body>
    <section id="content">
        <div class="content-box">
            <h2>404 - 页面未找到</h2>
            <hr class="divider">
            <div class="content-section">
                <div class="content-text">
                    <h3>哎呀！页面走丢了</h3>
                    <p>抱歉，您访问的页面不存在。</p>
                    <p>可能是链接错误、页面已被移动或删除。</p>
                    <p>请检查URL是否正确，或使用以下链接返回：</p>
                    <p><a href="/" class="quick-link" >返回首页</a></p>
                </div>
            </div>
            <hr class="divider">
            <div class="content-section">
                <div class="content-text">
                </div>
            </div>
        </div>
    </section>

    <script src="/lib/all.js"></script>
</body>

</html>
